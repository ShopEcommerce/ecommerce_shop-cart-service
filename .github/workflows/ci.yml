name: Cart Service CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout shared repo
        uses: actions/checkout@v4
        with:
          repository: ShopEcommerce/ecommerce_shop-shared
          path: shared

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Build Shared Library
        run: |
          cd shared
          npm install --cache .npm-cache
          npm run build
          npm pack --cache .npm-cache

      - name: Install Dependencies
        run: |
          npm install ./shared/teleshop-common-1.0.4.tgz --cache .npm-cache
          npm install --cache .npm-cache

      - name: Run Linter
        run: |
          npm run lint

      - name: Run Unit Tests
        run: |
          npm run test:ci
